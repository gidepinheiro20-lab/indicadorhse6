












databases:
  - name: indicadorhse6-db
    plan: free
    databaseName: indicadorhse6
    user: indicadorhse6_user

services:
  - type: web
    name: indicadorhse6
    env: node
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: indicadorhse6-db
          property: connectionString
